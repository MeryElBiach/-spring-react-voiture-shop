services:

  mariadb:
    container_name: mariadb
    image: mariadb:10.11
    restart: always
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: compagnie
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - voiture-net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  springboot-app:
    container_name: springboot-app
    build: .
    restart: always
    ports:
      - "9090:8080"
    environment:
      MARIADB_HOST: mariadb
      MARIADB_PORT: 3306
      MARIADB_USER: root
      MARIADB_PASSWORD: root
      OLLAMA_HOST: ollama
      OLLAMA_PORT: 11434
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - voiture-net

  ollama:
    container_name: ollama
    image: ollama/ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: >
      sh -c "ollama serve &
             sleep 5 &&
             ollama pull llama3.2 &&
             wait"
    networks:
      - voiture-net
  react-app:
    container_name: react-app
    build:
      context: .
      dockerfile: Dockerfile.react
    ports:
      - "3000:80"
    networks:
      - voiture-net
    depends_on:
      - springboot-app

volumes:
  mariadb_data:
  ollama_data:

networks:
  voiture-net:
    driver: bridge