# ===========================================
# CONFIG MariaDB
# ===========================================
spring.datasource.url=jdbc:mariadb://${MARIADB_HOST:localhost}:${MARIADB_PORT:3306}/compagnie
spring.datasource.username=${MARIADB_USER:root}
spring.datasource.password=${MARIADB_PASSWORD:root}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# ===========================================
# CONFIG JPA
# ===========================================
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# ===========================================
# CONFIG Spring AI / Ollama
# ===========================================
spring.ai.ollama.base-url=http://${OLLAMA_HOST:localhost}:${OLLAMA_PORT:11434}
spring.ai.ollama.chat.model=llama3.2

# ===========================================
# CONFIG Spring Data REST
# ===========================================
spring.data.rest.base-path=/api

# ===========================================
# CONFIG Springdoc
# ===========================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.enable-data-rest=false

