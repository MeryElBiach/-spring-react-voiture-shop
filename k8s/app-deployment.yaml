apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-deployment
spec:
  selector:
    matchLabels:
      app: springboot-k8s
  replicas: 3
  template:
    metadata:
      labels:
        app: springboot-k8s
    spec:
      containers:
        - name: springboot-app
          image: springdatarest-springboot-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: MARIADB_HOST
              value: mariadb
            - name: MARIADB_PORT
              value: "3306"
            - name: MARIADB_USER
              value: root
            - name: MARIADB_PASSWORD
              value: root
            - name: OLLAMA_HOST
              value: ollama
            - name: OLLAMA_PORT
              value: "11434"
---
apiVersion: v1
kind: Service
metadata:
  name: springboot-svc
spec:
  selector:
    app: springboot-k8s
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: NodePort